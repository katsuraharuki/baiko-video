<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>梅光学院中学校・高等学校 学校説明｜チャプター視聴ページ</title>
<style>
  :root{
    --wine:#6E1423;
    --wine-dark:#4A0E18;
    --wine-deep:#360A12;
    --wine-light:#8B2635;
    --wine-glow:#A4243B;
    --gold:#C9A24B;
    --gold-soft:#E2C988;
    --cream:#F8F3EC;
    --cream-2:#F1E8DA;
    --ink:#2A2024;
    --muted:#6c5b60;
    --card:#ffffff;
    --shadow:0 10px 30px rgba(54,10,18,.14);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,"Noto Sans JP",Meiryo,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -200px, rgba(110,20,35,.10), transparent 60%),
      linear-gradient(180deg,var(--cream) 0%, var(--cream-2) 100%);
    min-height:100vh;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Header ===== */
  .topbar{
    background:
      radial-gradient(700px 200px at 80% -60px, rgba(201,162,75,.22), transparent 60%),
      linear-gradient(135deg,var(--wine-deep),var(--wine) 55%,var(--wine-light));
    color:#fff;
    padding:28px 20px 30px;
    border-bottom:3px solid var(--gold);
    position:relative;
    overflow:hidden;
  }
  .topbar::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 70%,rgba(0,0,0,.18));
    pointer-events:none;
  }
  .topbar-inner{max-width:1000px;margin:0 auto;position:relative;z-index:1;}
  .topbar-flex{display:flex;align-items:center;gap:22px;}
  .emblem-wrap{flex:none;}
  .emblem-wrap svg{
    width:32px;height:32px;
    filter:drop-shadow(0 2px 12px rgba(0,0,0,.4));
  }
  .topbar-text{flex:1;min-width:0;}
  .crest-label{
    font-size:12px;letter-spacing:.28em;color:var(--gold-soft);
    text-transform:uppercase;margin-bottom:6px;font-weight:700;opacity:.9;
  }
  .topbar h1{
    margin:0;font-size:clamp(20px,4.2vw,32px);font-weight:800;
    letter-spacing:.04em;
  }
  .topbar .sub{
    margin:8px 0 0;color:rgba(255,255,255,.84);font-size:clamp(12px,2.2vw,14px);
    letter-spacing:.02em;
  }
  @media(max-width:480px){
    .topbar-flex{gap:14px;}
  }

  /* ===== Layout ===== */
  .wrap{max-width:1000px;margin:0 auto;padding:26px 18px 60px;}

  /* ===== Player ===== */
  .player-card{
    background:var(--wine-deep);
    border:1px solid rgba(201,162,75,.45);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:14px;
  }
  .ratio{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
  .ratio>iframe,.ratio>video{
    position:absolute;inset:0;width:100%;height:100%;border:0;display:block;
  }
  .now-playing{
    display:flex;align-items:center;gap:10px;
    padding:12px 16px;color:#fff;
    background:linear-gradient(90deg,var(--wine-dark),var(--wine));
    font-size:14px;
  }
  .now-playing .dot{
    width:9px;height:9px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 0 0 rgba(201,162,75,.7);animation:pulse 1.8s infinite;flex:none;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(201,162,75,.55);}
    70%{box-shadow:0 0 0 9px rgba(201,162,75,0);}
    100%{box-shadow:0 0 0 0 rgba(201,162,75,0);}
  }
  .now-playing .np-label{opacity:.75;font-size:12px;letter-spacing:.08em;}
  .now-playing .np-title{font-weight:700;}
  .now-playing .np-time{margin-left:auto;color:var(--gold-soft);font-variant-numeric:tabular-nums;font-size:13px;}

  /* ===== Section heading ===== */
  .section-head{
    display:flex;align-items:baseline;gap:12px;margin:30px 2px 16px;
  }
  .section-head h2{
    margin:0;font-size:20px;font-weight:800;color:var(--wine);letter-spacing:.06em;
    position:relative;padding-bottom:6px;
  }
  .section-head h2::after{
    content:"";position:absolute;left:0;bottom:0;width:46px;height:3px;
    background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;
  }
  .section-head .hint{font-size:12.5px;color:var(--muted);}

  /* ===== Chapter grid ===== */
  .chapters{
    display:grid;gap:12px;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  }
  .chapter{
    --c:var(--wine);
    appearance:none;text-align:left;cursor:pointer;font:inherit;color:var(--ink);
    background:var(--card);
    border:1px solid rgba(110,20,35,.14);
    border-left:4px solid var(--c);
    border-radius:12px;padding:14px 14px 14px 13px;
    display:flex;align-items:center;gap:13px;
    transition:transform .14s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
    box-shadow:0 2px 6px rgba(54,10,18,.06);
  }
  .chapter:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(54,10,18,.16);
    border-color:rgba(110,20,35,.3);
  }
  .chapter:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .chapter .num{
    flex:none;width:38px;height:38px;border-radius:10px;
    display:grid;place-items:center;font-weight:800;font-size:15px;
    color:var(--wine);background:linear-gradient(135deg,#fff,#f3e7d6);
    border:1px solid rgba(201,162,75,.5);font-variant-numeric:tabular-nums;
  }
  .chapter .meta{min-width:0;flex:1;}
  .chapter .title{font-weight:700;font-size:15px;line-height:1.35;}
  .chapter .time{
    font-size:12px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums;
    display:inline-flex;align-items:center;gap:5px;
  }
  .chapter .time::before{content:"▶";font-size:8px;color:var(--gold);}

  /* active state */
  .chapter.active{
    background:linear-gradient(135deg,var(--wine),var(--wine-light));
    border-color:var(--gold);color:#fff;
    box-shadow:0 8px 22px rgba(110,20,35,.4);
  }
  .chapter.active .num{
    background:rgba(255,255,255,.16);color:#fff;border-color:rgba(255,255,255,.5);
  }
  .chapter.active .title{color:#fff;}
  .chapter.active .time{color:var(--gold-soft);}
  .chapter.active .time::before{color:var(--gold-soft);}

  /* ===== Notice / config banner ===== */
  .banner{
    margin-top:26px;padding:14px 16px;border-radius:12px;font-size:13px;
    background:#fff7ea;border:1px solid var(--gold);color:#7a5a18;
    display:flex;gap:10px;align-items:flex-start;
  }
  .banner b{color:var(--wine);}
  .banner code{
    background:rgba(110,20,35,.08);padding:1px 6px;border-radius:5px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--wine);
  }

  /* ===== Footer ===== */
  footer{
    text-align:center;color:var(--muted);font-size:12px;
    padding:26px 18px 40px;
  }
  footer .line{
    width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:0 auto 14px;
  }

  /* ===== CTA ===== */
  .cta-wrap{
    margin-top:40px;text-align:center;
    padding:36px 24px 32px;
    background:linear-gradient(135deg,var(--wine-deep),var(--wine));
    border-radius:var(--radius);
    border:1px solid rgba(201,162,75,.4);
    box-shadow:var(--shadow);
  }
  .cta-lead{
    margin:0 0 18px;color:rgba(255,255,255,.8);
    font-size:14px;letter-spacing:.08em;
  }
  .cta-btn{
    display:inline-flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,var(--gold),#b8883a);
    color:#3a1a00;font-weight:800;font-size:clamp(15px,3.5vw,18px);
    text-decoration:none;padding:16px 32px;border-radius:50px;
    letter-spacing:.06em;
    box-shadow:0 6px 22px rgba(201,162,75,.5);
    transition:transform .15s ease,box-shadow .15s ease;
  }
  .cta-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(201,162,75,.65);
  }
  .cta-icon{color:rgba(58,26,0,.6);font-size:14px;}
  .cta-arrow{font-size:18px;}
  .cta-sub{
    margin:16px 0 0;color:rgba(255,255,255,.6);
    font-size:13px;letter-spacing:.04em;
  }

  @media (max-width:520px){
    .chapters{grid-template-columns:1fr;}
    .wrap{padding:20px 14px 50px;}
    .cta-btn{padding:14px 22px;font-size:15px;}
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-flex">
        <div class="emblem-wrap">
          <!-- 梅光学院 紋章 SVG -->
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="梅光学院 紋章">
            <defs>
              <path id="arcTop" d="M 30,100 A 70,70 0 0,1 170,100"/>
              <path id="arcBot" d="M 35,108 A 65,65 0 0,0 165,108"/>
            </defs>
            <!-- outer ring -->
            <circle cx="100" cy="100" r="94" fill="none" stroke="#F5E6C8" stroke-width="2.2"/>
            <circle cx="100" cy="100" r="88" fill="none" stroke="#F5E6C8" stroke-width="1.1"/>
            <!-- radiating lines (8 directions) -->
            <g stroke="#F5E6C8" stroke-width="1.8" opacity=".85">
              <line x1="100" y1="12" x2="100" y2="55"/>
              <line x1="100" y1="145" x2="100" y2="188"/>
              <line x1="12" y1="100" x2="55" y2="100"/>
              <line x1="145" y1="100" x2="188" y2="100"/>
              <line x1="27" y1="27" x2="60" y2="60"/>
              <line x1="140" y1="140" x2="173" y2="173"/>
              <line x1="173" y1="27" x2="140" y2="60"/>
              <line x1="27" y1="173" x2="60" y2="140"/>
            </g>
            <!-- inner ring -->
            <circle cx="100" cy="100" r="52" fill="none" stroke="#F5E6C8" stroke-width="2"/>
            <circle cx="100" cy="100" r="46" fill="none" stroke="#F5E6C8" stroke-width="1"/>
            <!-- plum blossom (梅) center -->
            <g fill="#F5E6C8">
              <!-- 5 petals -->
              <ellipse cx="100" cy="78" rx="7.5" ry="10" transform="rotate(0,100,100)"/>
              <ellipse cx="100" cy="78" rx="7.5" ry="10" transform="rotate(72,100,100)"/>
              <ellipse cx="100" cy="78" rx="7.5" ry="10" transform="rotate(144,100,100)"/>
              <ellipse cx="100" cy="78" rx="7.5" ry="10" transform="rotate(216,100,100)"/>
              <ellipse cx="100" cy="78" rx="7.5" ry="10" transform="rotate(288,100,100)"/>
              <!-- star outline over petals -->
              <polygon points="100,72 102.4,79.3 110,79.3 104,84 106.4,91.3 100,87 93.6,91.3 96,84 90,79.3 97.6,79.3" fill="none" stroke="#F5E6C8" stroke-width="1.2"/>
              <!-- center dot -->
              <circle cx="100" cy="100" r="5.5"/>
            </g>
            <!-- arc text top: Ut filii / lucis -->
            <text font-family="Georgia,serif" font-size="11" fill="#F5E6C8" letter-spacing="2">
              <textPath href="#arcTop" startOffset="8%">Ut filii</textPath>
            </text>
            <text font-family="Georgia,serif" font-size="11" fill="#F5E6C8" letter-spacing="2">
              <textPath href="#arcTop" startOffset="62%">lucis</textPath>
            </text>
            <!-- arc text bottom: 1872 / ambulate -->
            <text font-family="Georgia,serif" font-size="10.5" fill="#F5E6C8" letter-spacing="1.8">
              <textPath href="#arcBot" startOffset="6%">1872</textPath>
            </text>
            <text font-family="Georgia,serif" font-size="10.5" fill="#F5E6C8" letter-spacing="1.8">
              <textPath href="#arcBot" startOffset="52%">ambulate</textPath>
            </text>
          </svg>
        </div>
        <div class="topbar-text">
          <div class="crest-label">BAIKO GAKUIN — Since 1872</div>
          <h1>梅光学院中学校・高等学校 学校説明</h1>
          <p class="sub">気になるテーマをワンタップ。知りたいところから、自由にご覧いただけます。</p>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="player-card">
      <div class="ratio" id="playerArea">
        <!-- player (iframe or video) is injected here -->
      </div>
      <div class="now-playing">
        <span class="dot"></span>
        <span class="np-label">再生中</span>
        <span class="np-title" id="npTitle">オープニング・目次</span>
        <span class="np-time" id="npTime">0:00</span>
      </div>
    </div>

    <div class="section-head">
      <h2>目次・チャプター</h2>
      <span class="hint">タップでその場面へジャンプします</span>
    </div>
    <div class="chapters" id="chapters"></div>

    <!-- CTA -->
    <div class="cta-wrap">
      <p class="cta-lead">説明動画をご覧いただいた方へ</p>
      <a class="cta-btn" href="https://www.baiko.ac.jp/highschool/openschool/" target="_blank" rel="noopener">
        <span class="cta-icon">✦</span>
        オープンスクールに申し込む
        <span class="cta-arrow">→</span>
      </a>
      <p class="cta-sub">実際の校風・施設を、ぜひ体験しにいらしてください。</p>
    </div>
  </main>

  <footer>
    <div class="line"></div>
    梅光学院 学校説明 チャプター視聴ページ
  </footer>

<script>
/* =========================================================================
   設定（ここだけ編集すればOK）
   ========================================================================= */
const CONFIG = {
  // 'vimeo' … 本番公開用（Vimeo埋め込み）
  // 'local' … 手元の動画ファイルでデザイン・動作を確認するプレビュー用
  MODE: 'youtube',

  YOUTUBE_ID: 'D1VXDW-hl3w',

  LOCAL_SRC: 'https://raw.githubusercontent.com/katsuraharuki/baiko-video/main/school_web.mp4'
};

/* =========================================================================
   チャプター定義（label = 表示名 / t = 開始秒数）
   ========================================================================= */
const CHAPTERS = [
  { label:'オープニング・目次',        t:0   },
  { label:'梅光学院の特色',            t:15  },
  { label:'教育',                      t:393 },   // 6:33
  { label:'英語教育',                  t:917 },   // 15:17
  { label:'留学',                      t:1154 },  // 19:14
  { label:'費用',                      t:1534 },  // 25:34
  { label:'学校生活',                  t:1856 },  // 30:56
  { label:'行事・郊外活動',            t:2056 },  // 34:16
  { label:'校則',                      t:2253 },  // 37:33
  { label:'進路',                      t:2343 },  // 39:03
  { label:'エンディング',              t:2519 },  // 41:59
];

/* =========================================================================
   共通ユーティリティ
   ========================================================================= */
const fmt = s => {
  s = Math.max(0, Math.floor(s||0));
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
};

const chaptersEl = document.getElementById('chapters');
const npTitle = document.getElementById('npTitle');
const npTime  = document.getElementById('npTime');
let cards = [];
let activeIndex = -1;

/* チャプターカード描画 */
CHAPTERS.forEach((ch, i) => {
  const btn = document.createElement('button');
  btn.className = 'chapter';
  btn.type = 'button';
  btn.setAttribute('aria-label', ch.label + ' ' + fmt(ch.t) + 'へ移動');
  btn.innerHTML =
    '<span class="num">'+String(i+1).padStart(2,'0')+'</span>'+
    '<span class="meta">'+
      '<span class="title">'+ch.label+'</span>'+
      '<span class="time">'+fmt(ch.t)+'</span>'+
    '</span>';
  btn.addEventListener('click', () => seekTo(ch.t, i));
  chaptersEl.appendChild(btn);
  cards.push(btn);
});

function setActive(i){
  if(i === activeIndex) return;
  activeIndex = i;
  cards.forEach((c,idx)=>c.classList.toggle('active', idx===i));
  if(CHAPTERS[i]) npTitle.textContent = CHAPTERS[i].label;
}

/* 現在時刻からアクティブなチャプターを判定 */
function indexForTime(t){
  let idx = 0;
  for(let i=0;i<CHAPTERS.length;i++){
    if(t + 0.4 >= CHAPTERS[i].t) idx = i; else break;
  }
  return idx;
}

/* =========================================================================
   プレーヤー抽象化：seekTo / 再生位置の監視を MODE 別に実装
   ========================================================================= */
let seekTo = () => {};
const area = document.getElementById('playerArea');

if(CONFIG.MODE === 'youtube'){
  // --- YouTube IFrame API ---
  const div = document.createElement('div');
  div.id = 'ytplayer';
  area.appendChild(div);

  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  let player = null;
  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('ytplayer', {
      videoId: CONFIG.YOUTUBE_ID,
      playerVars: {
        rel:0, modestbranding:1, playsinline:1, cc_load_policy:0, iv_load_policy:3
      },
      events:{
        onReady: () => {
          setInterval(()=>{
            if(player && player.getCurrentTime){
              const t = player.getCurrentTime();
              npTime.textContent = fmt(t);
              setActive(indexForTime(t));
            }
          }, 500);
        }
      }
    });
  };

  seekTo = (t, i) => {
    if(player && player.seekTo){
      player.seekTo(t, true);
      player.playVideo();
    }
    setActive(i);
  };

} else {
  // --- ローカル / 自前MP4（HTML5 video）---
  const video = document.createElement('video');
  video.src = CONFIG.LOCAL_SRC;
  video.controls = true;
  video.playsInline = true;
  video.preload = 'metadata';
  area.appendChild(video);

  video.addEventListener('timeupdate', ()=>{
    npTime.textContent = fmt(video.currentTime);
    setActive(indexForTime(video.currentTime));
  });
  video.addEventListener('error', ()=>{
    area.insertAdjacentHTML('beforeend',
      '<div style="position:absolute;inset:0;display:grid;place-items:center;'+
      'color:#fff;background:#360A12;text-align:center;padding:20px;font-size:13px;line-height:1.7">'+
      '動画を読み込めませんでした。<br>CONFIG.LOCAL_SRC のパスを確認するか、'+
      'ブラウザが対応する形式（MP4/H.264）か確認してください。</div>');
  });

  seekTo = (t, i) => {
    video.currentTime = t;
    video.play().catch(()=>{});
    setActive(i);
  };
}

/* 初期表示 */
setActive(0);
</script>
</body>
</html>
